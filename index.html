<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚁 Fake Drone Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 1000px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 20px;
      font-weight: 300;
      letter-spacing: 1px;
    }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 25px;
    }
    .stat-card {
      background: #ecf0f1;
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
    }
    .stat-card .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #7f8c8d;
      letter-spacing: 0.5px;
    }
    .stat-card .value {
      font-size: 1.8rem;
      font-weight: 600;
      color: #2c3e50;
      margin-top: 4px;
    }
    .stat-card .value.battery {
      color: #27ae60;
    }
    .stat-card .value.warning {
      color: #e67e22;
    }
    .stat-card .value.danger {
      color: #e74c3c;
    }
    .canvas-wrapper {
      background: #1e272e;
      border-radius: 16px;
      padding: 10px;
      margin: 20px 0 25px;
      display: flex;
      justify-content: center;
    }
    canvas {
      background: #2f3640;
      border-radius: 8px;
      width: 100%;
      max-width: 700px;
      height: auto;
      aspect-ratio: 16 / 9;
      display: block;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 10px;
    }
    .controls button {
      background: #3498db;
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(52,152,219,0.3);
      flex: 0 1 auto;
      min-width: 120px;
    }
    .controls button:hover {
      background: #2980b9;
    }
    .controls button:active {
      transform: scale(0.96);
    }
    .controls button.emergency {
      background: #e74c3c;
      box-shadow: 0 2px 8px rgba(231,76,60,0.3);
    }
    .controls button.emergency:hover {
      background: #c0392b;
    }
    .controls button.land {
      background: #f39c12;
      box-shadow: 0 2px 8px rgba(243,156,18,0.3);
    }
    .controls button.land:hover {
      background: #d68910;
    }
    .controls button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    #statusText {
      text-align: center;
      margin-top: 16px;
      font-size: 1.1rem;
      color: #2c3e50;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 16px;
      border-radius: 30px;
      font-weight: 600;
    }
    .status-badge.idle { background: #bdc3c7; color: #2c3e50; }
    .status-badge.flying { background: #2ecc71; color: white; }
    .status-badge.emergency { background: #e74c3c; color: white; }
    .status-badge.landing { background: #f39c12; color: white; }
    .footer {
      text-align: center;
      font-size: 0.8rem;
      color: #95a5a6;
      margin-top: 20px;
      border-top: 1px solid #ecf0f1;
      padding-top: 16px;
    }
    @media (max-width: 600px) {
      .container { padding: 16px; }
      .controls button { min-width: 80px; padding: 10px 16px; font-size: 0.9rem; }
      .stat-card .value { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🚁 Drone Telemetry</h1>

  <!-- Stats Cards -->
  <div class="dashboard" id="stats">
    <div class="stat-card"><div class="label">Status</div><div class="value" id="statusDisplay">IDLE</div></div>
    <div class="stat-card"><div class="label">Battery</div><div class="value battery" id="batteryDisplay">--%</div></div>
    <div class="stat-card"><div class="label">Altitude</div><div class="value" id="altDisplay">0 m</div></div>
    <div class="stat-card"><div class="label">Speed</div><div class="value" id="speedDisplay">0 m/s</div></div>
    <div class="stat-card"><div class="label">Heading</div><div class="value" id="headingDisplay">0°</div></div>
    <div class="stat-card"><div class="label">Position</div><div class="value" id="posDisplay" style="font-size:1rem;">--</div></div>
  </div>

  <!-- Canvas Visualizer -->
  <div class="canvas-wrapper">
    <canvas id="droneCanvas" width="800" height="450"></canvas>
  </div>

  <!-- Control Buttons -->
  <div class="controls">
    <button id="btnTakeoff">🛫 Takeoff</button>
    <button id="btnMove">📍 Move Waypoint</button>
    <button id="btnEmergency" class="emergency">🆘 Emergency</button>
    <button id="btnLand" class="land">🛬 Land</button>
  </div>

  <div id="statusText">
    <span class="status-badge idle" id="statusBadge">IDLE</span>
    <span id="extraInfo">Ready</span>
  </div>
  <div class="footer">Mock Drone Simulator | Data updates every 1s</div>
</div>

<script>
  // ─── DOM references ──────────────────────────────────────────
  const canvas = document.getElementById('droneCanvas');
  const ctx = canvas.getContext('2d');

  const statusDisplay = document.getElementById('statusDisplay');
  const statusBadge = document.getElementById('statusBadge');
  const batteryDisplay = document.getElementById('batteryDisplay');
  const altDisplay = document.getElementById('altDisplay');
  const speedDisplay = document.getElementById('speedDisplay');
  const headingDisplay = document.getElementById('headingDisplay');
  const posDisplay = document.getElementById('posDisplay');
  const extraInfo = document.getElementById('extraInfo');

  const btnTakeoff = document.getElementById('btnTakeoff');
  const btnMove = document.getElementById('btnMove');
  const btnEmergency = document.getElementById('btnEmergency');
  const btnLand = document.getElementById('btnLand');

  // ─── Mock state ──────────────────────────────────────────────
  let state = {
    status: 'IDLE',          // IDLE | FLYING | EMERGENCY | LANDING
    battery: 85,
    position: { lat: 48.8584, lng: 2.2945, alt: 0 },
    speed: 0,
    heading: 45,
    target: null
  };

  let timer = null;

  // ─── Update UI from state ────────────────────────────────────
  function updateUI(data) {
    const status = data.status || 'IDLE';
    statusDisplay.textContent = status;
    statusBadge.textContent = status;
    statusBadge.className = `status-badge ${getStatusBadgeClass(status)}`;

    const bat = data.battery || 0;
    batteryDisplay.textContent = bat + '%';
    batteryDisplay.className = 'value battery';
    if (bat < 20) batteryDisplay.className += ' danger';
    else if (bat < 50) batteryDisplay.className += ' warning';

    const alt = data.position?.alt || 0;
    altDisplay.textContent = alt.toFixed(1) + ' m';

    const speed = data.speed || 0;
    speedDisplay.textContent = speed.toFixed(1) + ' m/s';

    const heading = data.heading || 0;
    headingDisplay.textContent = Math.round(heading) + '°';

    const pos = data.position;
    if (pos) posDisplay.textContent = `${pos.lat.toFixed(5)}, ${pos.lng.toFixed(5)}`;

    if (data.target) {
      const t = data.target;
      extraInfo.textContent = `🎯 Moving to (${t.lat.toFixed(5)}, ${t.lng.toFixed(5)}, ${t.alt}m)`;
    } else {
      extraInfo.textContent = data.status === 'FLYING' ? '⏳ Hovering' : '🟢 Ready';
    }

    const isFlying = status === 'FLYING';
    const isIdle = status === 'IDLE';
    btnTakeoff.disabled = isFlying || status === 'EMERGENCY';
    btnMove.disabled = !isFlying;
    btnEmergency.disabled = isIdle || status === 'EMERGENCY';
    btnLand.disabled = !isFlying;
  }

  function getStatusBadgeClass(status) {
    const map = { 'IDLE': 'idle', 'FLYING': 'flying', 'EMERGENCY': 'emergency', 'LANDING': 'landing' };
    return map[status] || 'idle';
  }

  // ─── Draw canvas ─────────────────────────────────────────────
  function drawCanvas(data) {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // Grid
    ctx.strokeStyle = '#3a4a5a';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < w; i += 40) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
    }
    for (let i = 0; i < h; i += 40) {
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke();
    }

    const pos = data.position;
    if (pos && pos.lat && pos.lng) {
      const scale = 0.0001;
      const centerLat = 48.8584, centerLng = 2.2945;
      const dx = (pos.lng - centerLng) / scale;
      const dy = (pos.lat - centerLat) / scale;
      const x = w/2 + dx;
      const y = h/2 - dy;
      const margin = 20;
      const cx = Math.min(Math.max(x, margin), w - margin);
      const cy = Math.min(Math.max(y, margin), h - margin);

      ctx.shadowColor = 'rgba(46, 204, 113, 0.5)';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(cx, cy, 14, 0, 2 * Math.PI);
      ctx.fillStyle = data.status === 'FLYING' ? '#2ecc71' : '#95a5a6';
      ctx.fill();
      ctx.shadowBlur = 0;

      const headingRad = data.heading * Math.PI / 180;
      const length = 30;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + length * Math.sin(headingRad), cy - length * Math.cos(headingRad));
      ctx.strokeStyle = '#f1c40f';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.fillStyle = 'white';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`alt: ${data.position.alt.toFixed(1)}m`, cx, cy - 28);

      if (data.target) {
        const tdx = (data.target.lng - centerLng) / scale;
        const tdy = (data.target.lat - centerLat) / scale;
        const tx = w/2 + tdx;
        const ty = h/2 - tdy;
        ctx.beginPath();
        ctx.arc(tx, ty, 8, 0, 2 * Math.PI);
        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#e74c3c';
        ctx.font = '10px sans-serif';
        ctx.fillText('🎯', tx - 12, ty - 12);
      }
    } else {
      ctx.fillStyle = '#95a5a6';
      ctx.font = '18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('No GPS data', w/2, h/2);
    }
  }

  // ─── Simulate telemetry update ──────────────────────────────
  function simulateTelemetry() {
    if (state.status === 'FLYING') {
      // Random walk position
      state.position.lat += (Math.random() - 0.5) * 0.0002;
      state.position.lng += (Math.random() - 0.5) * 0.0002;
      // Slight altitude drift
      state.position.alt += (Math.random() - 0.5) * 0.5;
      state.heading = (state.heading + (Math.random() - 0.5) * 4) % 360;
      state.speed = 2 + Math.random() * 4;
      // Battery drain (slow)
      state.battery = Math.max(0, state.battery - (Math.random() * 0.5));
      // If battery < 5%, auto land
      if (state.battery < 5) {
        state.status = 'LANDING';
        state.speed = 0;
        setTimeout(() => { state.status = 'IDLE'; state.position.alt = 0; }, 2000);
      }
    } else if (state.status === 'LANDING') {
      state.position.alt = Math.max(0, state.position.alt - 2);
      state.speed = 0;
      if (state.position.alt <= 0) {
        state.status = 'IDLE';
        state.position.alt = 0;
      }
    } else if (state.status === 'EMERGENCY') {
      state.speed = 0;
    }

    updateUI(state);
    drawCanvas(state);
  }

  // ─── Control functions (no API, just update state) ──────────
  function takeoff(alt) {
    if (state.status === 'FLYING') return;
    state.status = 'FLYING';
    state.position.alt = alt || 15;
    state.speed = 0;
    state.target = null;
    if (!timer) {
      timer = setInterval(simulateTelemetry, 1000);
    }
  }

  function moveTo(lat, lng, alt, speed) {
    if (state.status !== 'FLYING') return;
    state.target = { lat, lng, alt };
    state.position.alt = alt;
    state.speed = speed || 5;
  }

  function emergency() {
    state.status = 'EMERGENCY';
    state.speed = 0;
    state.target = null;
  }

  function land() {
    if (state.status === 'FLYING') {
      state.status = 'LANDING';
      state.speed = 0;
      state.target = null;
    }
  }

  // ─── Button bindings ──────────────────────────────────────────
  btnTakeoff.addEventListener('click', () => {
    const alt = prompt('Enter takeoff altitude (meters):', '15');
    if (alt === null) return;
    const altNum = parseFloat(alt);
    if (isNaN(altNum) || altNum <= 0) {
      alert('Please enter a positive number.');
      return;
    }
    takeoff(altNum);
  });

  btnMove.addEventListener('click', () => {
    const lat = prompt('Target latitude:', '48.8600');
    if (lat === null) return;
    const lng = prompt('Target longitude:', '2.2960');
    if (lng === null) return;
    const alt = prompt('Target altitude (m):', '25');
    if (alt === null) return;
    const speed = prompt('Speed (m/s):', '5');
    if (speed === null) return;

    const latNum = parseFloat(lat);
    const lngNum = parseFloat(lng);
    const altNum = parseFloat(alt);
    const speedNum = parseFloat(speed) || 5;
    if (isNaN(latNum) || isNaN(lngNum) || isNaN(altNum) || isNaN(speedNum)) {
      alert('Invalid numbers.');
      return;
    }
    moveTo(latNum, lngNum, altNum, speedNum);
  });

  btnEmergency.addEventListener('click', () => {
    if (confirm('Engage emergency hover?')) emergency();
  });

  btnLand.addEventListener('click', () => {
    if (confirm('Land the drone?')) land();
  });

  // ─── Initial render ──────────────────────────────────────────
  updateUI(state);
  drawCanvas(state);
  // Start auto‑update even on IDLE (to animate battery, etc.)
  if (!timer) {
    timer = setInterval(simulateTelemetry, 1000);
  }
</script>
        </body>
  </html>
